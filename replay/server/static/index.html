<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Replay</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="logo">Replay</span>
        <button class="refresh-btn" onclick="loadTraces()" title="Refresh">↻</button>
      </div>
      <div id="trace-list"></div>
    </aside>
    <main id="main">
      <div id="trace-detail">
        <div class="empty-state">
          <div class="empty-icon">◈</div>
          <p>Select a trace to explore</p>
        </div>
      </div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
